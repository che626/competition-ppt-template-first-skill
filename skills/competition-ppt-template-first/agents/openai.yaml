interface:
  display_name: "Competition PPT Template-First"
short_description: "Lock deck tokens, assets, speaking roles, evidence plans, and page layouts before generating editable competition PPT pages"
default_prompt: "Use $competition-ppt-template-first to analyze my documents and desired outcome before designing. Create deck style tokens, an image-asset register, a speaker map, a data-evidence plan for comparison or metric pages, and a layout registry with page rhythm. Then give every page a contract: content grouping, reading order, background scene, primary visual, real-image slots, text zones, supporting visual ingredients, and avoid list. Generate one bespoke whole-slide template image from each completed page contract, create editable PPT pages, and run rendered composition, hierarchy, density, and typography QA."
