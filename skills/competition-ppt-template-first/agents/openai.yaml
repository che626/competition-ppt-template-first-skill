interface:
  display_name: "Competition PPT Template-First"
  short_description: "Lock deck tokens, asset roles, and page layouts before generating one bespoke template per editable competition slide"
  default_prompt: "Use $competition-ppt-template-first to analyze my documents and desired outcome before designing. Create deck style tokens, an image-asset register, and a layout registry, then give every page a contract: content grouping, reading order, background scene, primary visual, real-image slots, text zones, supporting visual ingredients, and avoid list. Generate one bespoke whole-slide template image from each completed page contract, then create editable PPT pages and run rendered composition, hierarchy, density, and typography QA."
